shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "api-server"
    image: "ghcr.io/tinfoilsh/code-execution-environment/api-server@sha256:9abe566c18b4e211cadc82a5bfde81ea3ce9cdc94101a0267905a97db967ffb0" # v0.0.7
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    memory: "256m"
    cpus: 0.5
    volumes:
      - "execsock:/run/execsock"

  - name: "executor"
    image: "ghcr.io/tinfoilsh/code-execution-environment/executor@sha256:a5c860e34bcb44091e498ecfbd8619be7bdd9c9d76d05e2d535500556a3acd8b" # v0.0.7
    user: "1000:1000"
    read_only: true
    tmpfs:
      /workspace: "size=512m,mode=1777"
      /tmp: "size=64m,mode=1777"
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    # 3 GB covers the /workspace tmpfs (512 MB, RAM-backed) plus the
    # transient buffers held during /snapshot and /restore: a base64
    # JSON string (~683 MB) and the decoded tar bytes (~512 MB) live
    # simultaneously for the duration of the handler.
    memory: "3g"
    cpus: 1.5
    network_mode: "none"
    volumes:
      - "execsock:/run/execsock"

shim:
  upstream-port: 8000
  paths:
    - /exec
    - /read
    - /write
    - /snapshot
    - /restore
    - /health
